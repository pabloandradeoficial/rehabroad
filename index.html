<html lang="pt-BR">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover"/>
    <meta name="theme-color" content="#0f172a"/>
    <!-- Anti-FOUC: aplica classe de tema antes do primeiro paint -->
    <script>
      (function(){
        try {
          var t = localStorage.getItem('rehabroad-theme') || 'system';
          var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.add(dark ? 'dark' : 'light');
        } catch(e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    
    <!-- Default SEO. Worker (src/worker/seo.ts) injects route-specific tags
         for public pages (blog, biblioteca, comparacao, etc.) when bots crawl. -->
    <meta name="description" content="Plataforma clínica para fisioterapeutas — Rehabroad."/>
    <meta name="author" content="REHABROAD"/>
    <meta name="robots" content="index, follow"/>
    <meta name="google-site-verification" content="bDD2sz-I70k4D2RjXZekyV4wZFRX3-KGzDVi5LVUbiE"/>
    <link rel="canonical" href="https://rehabroad.com.br/"/>

    <!-- Open Graph -->
    <meta property="og:title" content="Rehabroad"/>
    <meta property="og:description" content="Plataforma clínica para fisioterapeutas."/>
    <meta property="og:url" content="https://rehabroad.com.br/"/>
    <meta property="og:type" content="website"/>
    <meta property="og:locale" content="pt_BR"/>
    <meta property="og:site_name" content="REHABROAD"/>

    <!-- Twitter Card -->
    <meta property="twitter:card" content="summary"/>
    <meta property="twitter:site" content="@rehabroad"/>
    <meta property="twitter:title" content="Rehabroad"/>
    <meta property="twitter:description" content="Plataforma clínica para fisioterapeutas."/>
    
    <!-- Favicon -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230f766e'/%3E%3Ctext x='50%25' y='53%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial, sans-serif' font-size='26' font-weight='700' fill='white'%3ERR%3C/text%3E%3C/svg%3E"
    />
    <link
      rel="shortcut icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230f766e'/%3E%3Ctext x='50%25' y='53%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial, sans-serif' font-size='26' font-weight='700' fill='white'%3ERR%3C/text%3E%3C/svg%3E"
    />
    
    <!-- Resource Hints: Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="dns-prefetch" href="https://www.googletagmanager.com"/>
    
    <!-- Preload critical font with font-display: swap -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'"/>
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"/></noscript>
    
    <title>Rehabroad</title>
    
    <!-- Critical CSS: prevent white flash before React mounts -->
    <style>
      @font-face { font-family: 'Inter'; font-display: swap; src: local('Inter'); }
      * { font-display: swap !important; }
      html, body { background-color: #0f172a; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
      #root { background-color: #0f172a; min-height: 100vh; }
    </style>
    
    <!-- Schema.org Structured Data -->
    <!-- Minimal Organization schema. Public pages (blog, biblioteca, etc.)
         get their own structured data injected by the worker for bots. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "REHABROAD",
      "url": "https://rehabroad.com.br",
      "description": "Plataforma clínica para fisioterapeutas",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": "Portuguese"
      }
    }
    </script>
  </head>
  <body>
    <!-- Pre-React loader: minimal spinner that matches LoginPage's own loader.
         No static landing copy — app is login + dashboard, no marketing shell. -->
    <div id="pre-react-loader" style="position:fixed;inset:0;z-index:9999;background:#0f172a;display:flex;align-items:center;justify-content:center;">
      <div style="width:40px;height:40px;border:4px solid #14b8a6;border-top-color:transparent;border-radius:50%;animation:rr-spin 1s linear infinite;"></div>
      <style>@keyframes rr-spin{to{transform:rotate(360deg);}}</style>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/react-app/main.tsx"></script>

    <!-- Deferred Third-Party Scripts -->
    <script defer src="https://www.googletagmanager.com/gtag/js?id=AW-17970194986"></script>
    <script defer>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'AW-17970194986');
    </script>

    <!-- Remove pre-React loader once React mounts. Also reload on bfcache restore
         so users navigating Back/Forward never see a stale React tree. -->
    <script>
      (function() {
        var loader = document.getElementById('pre-react-loader');
        var root = document.getElementById('root');
        if (root && loader) {
          var observer = new MutationObserver(function() {
            if (root.childNodes.length > 0 && loader.parentNode) {
              loader.remove();
              observer.disconnect();
            }
          });
          observer.observe(root, { childList: true });
          // Fallback: hide after 4s in case React fails to mount.
          setTimeout(function() {
            if (loader && loader.parentNode) loader.remove();
            observer.disconnect();
          }, 4000);
        }

        // bfcache (back/forward cache) protection: if the page was restored
        // from a snapshot, force a reload so we never render the previous
        // session's React state (which could be the old landing).
        window.addEventListener('pageshow', function(e) {
          if (e.persisted) window.location.reload();
        });
      })();
    </script>
  </body>
</html>
